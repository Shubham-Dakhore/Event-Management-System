<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Booking | EvXpert</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

<style>

/* ===== BACKGROUND ===== */
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#1a1a1a,#000);
}

/* ===== CENTER BOX ===== */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== FORM CARD ===== */
.form-box{
    width:400px;
    background:#1a1a1a;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    text-align:center;
}

/* ===== TITLE ===== */
.form-box h2{
    color:white;
    margin-bottom:20px;
}

.form-box span{
    color:#ff7e92;
}

/* ===== INPUT ===== */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#aaa;
}

.input-group input,
.input-group select{
    width:100%;
    padding:12px 12px 12px 35px;
    border:none;
    border-radius:6px;
    background:#2b2b2b;
    color:white;
}

.input-group input:focus,
.input-group select:focus{
    outline:none;
    border:1px solid #ff7e92;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#ff7e92;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:transparent;
    border:2px solid #ff7e92;
    color:#ff7e92;
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Edit <span>Booking</span></h2>

<form method="POST">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="name" value="{{ booking.name }}" required>
</div>

<div class="input-group">
<i class="fa fa-location-dot"></i>
<input type="text" name="address" value="{{ booking.address }}" required>
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="text" name="phone" value="{{ booking.phone }}" required>
</div>

<div class="input-group">
<i class="fa fa-calendar"></i>
<input type="text" name="event_type" value="{{ booking.event_type }}" required>
</div>

<div class="input-group">
<i class="fa fa-calendar-day"></i>
<input type="date" name="event_date" value="{{ booking.event_date }}" required>
</div>

<div class="input-group">
<i class="fa fa-layer-group"></i>
<select name="plan">
    <option value="basic" {% if booking.plan=='basic' %}selected{% endif %}>Basic</option>
    <option value="premium" {% if booking.plan=='premium' %}selected{% endif %}>Premium</option>
    <option value="luxury" {% if booking.plan=='luxury' %}selected{% endif %}>Luxury</option>
    <option value="ultra" {% if booking.plan=='ultra' %}selected{% endif %}>Ultra</option>
</select>
</div>

<div class="input-group">
<i class="fa fa-rupee-sign"></i>
<input type="number" name="amount" value="{{ booking.amount }}" required>
</div>

<button type="submit">Update Booking</button>

</form>

</div>
</div>

</body>
</html>
